{% extends "base.html" %}
{% block content %}
<h2>Mark Attendance</h2>
<form method="POST" enctype="multipart/form-data" id="attendance-form">
    <label>Subject:</label>
    <select name="subject_id" required>
        <option value="">Select subject</option>
        {% for subject in subjects %}
            <option value="{{ subject.id }}">{{ subject.name }}</option>
        {% endfor %}
    </select><br>
    <label>Capture Image:</label>
    <input type="file" name="image" accept="image/*" id="image-input"><br>
    <button type="submit">Mark Attendance</button>
</form>
<p>Alternatively, use webcam:</p>
<video id="video" width="320" height="240" autoplay></video>
<button id="capture">Capture from Webcam</button>
<canvas id="canvas" style="display:none;"></canvas>
<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const captureBtn = document.getElementById('capture');
    const imageInput = document.getElementById('image-input');
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(err => console.log(err));
    }
    captureBtn.addEventListener('click', () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        canvas.toBlob(blob => {
            const file = new File([blob], 'webcam.jpg', { type: 'image/jpeg' });
            const dataTransfer = new DataTransfer();
            dataTransfer.items.add(file);
            imageInput.files = dataTransfer.files;
        }, 'image/jpeg');
    });
</script>
{% endblock %}
