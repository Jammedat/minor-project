{% extends "base.html" %}
{% block content %}
<h2>{{ student.name }} ({{ student.roll_no }})</h2>
<p>Batch: {{ student.batch.name }}</p>
<p>Photos enrolled: {{ num_photos }}</p>

<h3>Add Photo</h3>
<form method="post" action="{{ url_for('add_photo', student_id=student.id) }}" enctype="multipart/form-data">
    <label>Capture from webcam:</label>
    <video id="video" width="320" height="240" autoplay></video>
    <button type="button" id="capture">Capture</button>
    <input type="file" name="photo" id="photo-file" accept="image/*" style="display:none;">
    <br>
    <label>Or upload image:</label>
    <input type="file" name="photo" accept="image/*" id="upload-input">
    <br>
    <button type="submit">Add Photo</button>
</form>
<script>
    const video = document.getElementById('video');
    const captureBtn = document.getElementById('capture');
    const fileInput = document.getElementById('photo-file');
    const uploadInput = document.getElementById('upload-input');

    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { video.srcObject = stream; })
            .catch(err => console.log(err));
    }

    captureBtn.addEventListener('click', () => {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        canvas.toBlob(blob => {
            const file = new File([blob], 'webcam.jpg', { type: 'image/jpeg' });
            const dataTransfer = new DataTransfer();
            dataTransfer.items.add(file);
            fileInput.files = dataTransfer.files;
            // Automatically submit the form (or we can set file input)
            fileInput.dispatchEvent(new Event('change'));
        }, 'image/jpeg');
    });

    // When fileInput changes, submit the form
    fileInput.addEventListener('change', () => {
        if (fileInput.files.length) {
            document.querySelector('form').submit();
        }
    });
    uploadInput.addEventListener('change', () => {
        if (uploadInput.files.length) {
            document.querySelector('form').submit();
        }
    });
</script>

<h3>Edit Name</h3>
<form method="post" action="{{ url_for('edit_student', student_id=student.id) }}">
    <input type="text" name="name" value="{{ student.name }}" required>
    <button type="submit">Update</button>
</form>
{% endblock %}
