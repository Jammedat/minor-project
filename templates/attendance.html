{% extends "base.html" %}
{% block content %}
<h2>Take Attendance for {{ subject.name }}</h2>
<div class="row">
    <div class="col-md-8">
        <video id="video" autoplay playsinline width="100%"></video>
        <div class="mt-2">
            <button id="stopBtn" class="btn btn-danger">Stop Attendance</button>
        </div>
    </div>
    <div class="col-md-4">
        <div id="resultBox" class="card">
            <div class="card-header">Recognition Status</div>
            <div class="card-body">
                <div id="statusMessage">Waiting for face...</div>
                <div id="challengeMessage"></div>
                <div id="resultName" style="font-size:1.5rem;"></div>
                <div id="confidence"></div>
            </div>
        </div>
        <div class="mt-3">
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Back to Dashboard</a>
        </div>
    </div>
</div>
<script>
    const video = document.getElementById('video');
    const statusDiv = document.getElementById('statusMessage');
    const challengeDiv = document.getElementById('challengeMessage');
    const resultName = document.getElementById('resultName');
    const confidenceDiv = document.getElementById('confidence');

    let stream = null;
    let interval = null;

    // Start webcam
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(s => {
                stream = s;
                video.srcObject = s;
                startSendingFrames();
            })
            .catch(err => {
                statusDiv.innerHTML = "Error accessing webcam: " + err.message;
            });
    } else {
        statusDiv.innerHTML = "getUserMedia not supported.";
    }

    function startSendingFrames() {
        // Capture frame every 200ms
        interval = setInterval(() => {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                const dataURL = canvas.toDataURL('image/jpeg');
                fetch('/attendance/process_frame', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: dataURL })
                })
                .then(response => response.json())
                .then(data => {
                    updateUI(data);
                })
                .catch(err => console.error(err));
            }
        }, 200);
    }

    function updateUI(data) {
        if (data.status === 'success') {
            statusDiv.innerHTML = "✅ Attendance Marked!";
            resultName.innerHTML = data.name;
            confidenceDiv.innerHTML = `Confidence: ${data.confidence.toFixed(1)}%`;
            if (data.marked) {
                challengeDiv.innerHTML = "✓ Present";
            } else {
                challengeDiv.innerHTML = "⚠ Already marked today";
            }
        } else if (data.status === 'no_match') {
            statusDiv.innerHTML = "❌ Face not recognized";
            resultName.innerHTML = data.name;
            confidenceDiv.innerHTML = `Confidence: ${data.confidence.toFixed(1)}%`;
            challengeDiv.innerHTML = data.message;
        } else if (data.status === 'challenge_active') {
            statusDiv.innerHTML = "🔍 Liveness Check";
            challengeDiv.innerHTML = `Perform: ${data.challenge}`;
            resultName.innerHTML = "";
            confidenceDiv.innerHTML = "";
        } else if (data.status === 'no_face') {
            statusDiv.innerHTML = "No face detected";
            challengeDiv.innerHTML = "";
            resultName.innerHTML = "";
            confidenceDiv.innerHTML = "";
        } else if (data.status === 'result' && data.success) {
            statusDiv.innerHTML = "✅ Marked!";
            resultName.innerHTML = data.name;
            confidenceDiv.innerHTML = `Confidence: ${data.confidence.toFixed(1)}%`;
        } else if (data.status === 'result' && !data.success) {
            statusDiv.innerHTML = "❌ Not recognized";
            resultName.innerHTML = data.name;
            confidenceDiv.innerHTML = `Confidence: ${data.confidence.toFixed(1)}%`;
        }
    }

    // Stop button
    document.getElementById('stopBtn').addEventListener('click', () => {
        if (interval) clearInterval(interval);
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            video.srcObject = null;
        }
        statusDiv.innerHTML = "Attendance stopped.";
    });
</script>
{% endblock %}
