{% extends "base.html" %}
{% block content %}
<h2>Select Department, Batch, and Subject</h2>

<form method="post">
    <div class="mb-3">
        <label for="department" class="form-label">Department</label>
        <select class="form-select" id="department" name="department" required>
            <option value="">-- Select Department --</option>
            {% for dept in departments %}
            <option value="{{ dept.id }}" {% if session.get('dept_id')|string == dept.id|string %}selected{% endif %}>
                {{ dept.name }}
            </option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label for="batch" class="form-label">Batch</label>
        <select class="form-select" id="batch" name="batch" required>
            <option value="">-- Select Batch --</option>
            {% for batch in batches %}
            <option value="{{ batch.id }}" {% if session.get('batch_id')|string == batch.id|string %}selected{% endif %}>
                {{ batch.name }}
            </option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label for="subject" class="form-label">Existing Subject</label>
        <select class="form-select" id="subject" name="subject">
            <option value="">-- Select Existing Subject --</option>
            {% for sub in subjects %}
            <option value="{{ sub.id }}" {% if session.get('subject_id')|string == sub.id|string %}selected{% endif %}>
                {{ sub.name }}
            </option>
            {% endfor %}
        </select>
        <div class="mt-2">Or create new:</div>
        <input type="text" class="form-control" id="new_subject" name="new_subject" placeholder="New subject name">
    </div>

    <button type="submit" class="btn btn-primary">Proceed to Attendance</button>
</form>

<hr>
<div class="mt-3">
    <a href="{{ url_for('students') }}" class="btn btn-secondary">Manage Students</a>
    <a href="{{ url_for('reports') }}" class="btn btn-secondary">View Reports</a>
</div>
{% endblock %}
