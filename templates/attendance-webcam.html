{% extends "base.html" %}
{% block content %}
<h2>Take Attendance for {{ subject.name }}</h2>

<div class="row">
    <div class="col-md-8">
        <!-- Camera source selector -->
        <div class="mb-3">
            <label class="form-label">Camera Source</label>
            <div class="btn-group" role="group">
                <input type="radio" class="btn-check" name="camSource" id="localCam" autocomplete="off" checked>
                <label class="btn btn-outline-primary" for="localCam">📷 Local Webcam</label>

                <input type="radio" class="btn-check" name="camSource" id="ipCam" autocomplete="off">
                <label class="btn btn-outline-primary" for="ipCam">🌐 IP Webcam</label>
            </div>
        </div>

        <!-- IP webcam URL input (hidden initially) -->
        <div id="ipCamUrlDiv" style="display: none;">
            <div class="mb-3">
                <label for="ipUrl" class="form-label">IP Camera URL</label>
                <input type="text" class="form-control" id="ipUrl" 
                       placeholder="http://192.168.1.100:8080/video" value="http://192.168.1.100:8080/video">
                <small class="text-muted">Use IP Webcam app (Android) or similar. The URL should return a single JPEG image or MJPEG stream.</small>
            </div>
        </div>

        <!-- Video element for local webcam -->
        <video id="video" autoplay playsinline width="100%"></video>

        <!-- Image element for IP webcam (hidden initially) -->
        <img id="ipCamImage" style="width: 100%; display: none;" alt="IP Camera Feed">

        <div class="mt-2">
            <button id="stopBtn" class="btn btn-danger">Stop Attendance</button>
        </div>
    </div>

    <div class="col-md-4">
        <div id="resultBox" class="card">
            <div class="card-header">Recognition Status</div>
            <div class="card-body">
                <div id="statusMessage">Waiting for face...</div>
                <div id="challengeMessage"></div>
                <div id="resultName" style="font-size:1.5rem;"></div>
                <div id="confidence"></div>
            </div>
        </div>
        <div class="mt-3">
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Back to Dashboard</a>
        </div>
    </div>
</div>

<script>
    let currentSource = 'local';  // 'local' or 'ip'
    let stream = null;
    let interval = null;
    let localVideo = document.getElementById('video');
    let ipImage = document.getElementById('ipCamImage');
    let ipUrlInput = document.getElementById('ipUrl');
    let ipUrlDiv = document.getElementById('ipCamUrlDiv');

    // Toggle between sources
    document.getElementById('localCam').addEventListener('change', function() {
        if (this.checked) {
            switchToLocal();
        }
    });
    document.getElementById('ipCam').addEventListener('change', function() {
        if (this.checked) {
            switchToIP();
        }
    });

    function switchToLocal() {
        currentSource = 'local';
        ipUrlDiv.style.display = 'none';
        ipImage.style.display = 'none';
        localVideo.style.display = 'block';

        // Stop any existing IP interval
        if (interval) clearInterval(interval);

        // Start local webcam
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(s => {
                    stream = s;
                    localVideo.srcObject = s;
                    startSendingFrames();
                })
                .catch(err => {
                    statusMessage.innerHTML = "Error accessing webcam: " + err.message;
                });
        } else {
            statusMessage.innerHTML = "getUserMedia not supported.";
        }
    }

    function switchToIP() {
        currentSource = 'ip';
        ipUrlDiv.style.display = 'block';
        ipImage.style.display = 'block';
        localVideo.style.display = 'none';
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            stream = null;
        }
        if (interval) clearInterval(interval);
        // Start IP camera feed and capture
        startIPCamera();
    }

    function startIPCamera() {
        // Load image once, then periodically refresh
        function updateImage() {
            let url = ipUrlInput.value.trim();
            if (url) {
                ipImage.src = url + '?' + new Date().getTime();  // add timestamp to avoid cache
            }
        }
        // Initial load
        updateImage();
        // Refresh image every 100ms to keep feed alive (adjust as needed)
        let refreshInterval = setInterval(updateImage, 100);
        // Capture frames separately (every 200ms)
        interval = setInterval(() => {
            if (ipImage.complete && ipImage.naturalWidth > 0) {
                captureAndSendFromImage();
            }
        }, 200);
        // Store refresh interval to clear later
        ipImage._refreshInterval = refreshInterval;
    }

    function captureAndSendFromImage() {
        const canvas = document.createElement('canvas');
        canvas.width = ipImage.naturalWidth;
        canvas.height = ipImage.naturalHeight;
        canvas.getContext('2d').drawImage(ipImage, 0, 0, canvas.width, canvas.height);
        const dataURL = canvas.toDataURL('image/jpeg');
        sendFrame(dataURL);
    }

    function startSendingFrames() {
        // For local video: capture frame every 200ms
        interval = setInterval(() => {
            if (localVideo.readyState === localVideo.HAVE_ENOUGH_DATA && localVideo.videoWidth > 0) {
                const canvas = document.createElement('canvas');
                canvas.width = localVideo.videoWidth;
                canvas.height = localVideo.videoHeight;
                canvas.getContext('2d').drawImage(localVideo, 0, 0, canvas.width, canvas.height);
                const dataURL = canvas.toDataURL('image/jpeg');
                sendFrame(dataURL);
            }
        }, 200);
    }

    function sendFrame(dataURL) {
        fetch('/attendance/process_frame', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: dataURL })
        })
        .then(response => response.json())
        .then(data => {
            updateUI(data);
        })
        .catch(err => console.error(err));
    }

    function updateUI(data) {
        const statusDiv = document.getElementById('statusMessage');
        const challengeDiv = document.getElementById('challengeMessage');
        const resultNameDiv = document.getElementById('resultName');
        const confidenceDiv = document.getElementById('confidence');

        if (data.status === 'success') {
            statusDiv.innerHTML = "✅ Attendance Marked!";
            resultNameDiv.innerHTML = data.name;
            confidenceDiv.innerHTML = `Confidence: ${data.confidence.toFixed(1)}%`;
            if (data.marked) {
                challengeDiv.innerHTML = "✓ Present";
            } else {
                challengeDiv.innerHTML = "⚠ Already marked today";
            }
        } else if (data.status === 'no_match') {
            statusDiv.innerHTML = "❌ Face not recognized";
            resultNameDiv.innerHTML = data.name;
            confidenceDiv.innerHTML = `Confidence: ${data.confidence.toFixed(1)}%`;
            challengeDiv.innerHTML = data.message;
        } else if (data.status === 'challenge_active') {
            statusDiv.innerHTML = "🔍 Liveness Check";
            challengeDiv.innerHTML = `Perform: ${data.challenge}`;
            resultNameDiv.innerHTML = "";
            confidenceDiv.innerHTML = "";
        } else if (data.status === 'no_face') {
            statusDiv.innerHTML = "No face detected";
            challengeDiv.innerHTML = "";
            resultNameDiv.innerHTML = "";
            confidenceDiv.innerHTML = "";
        } else if (data.status === 'result' && data.success) {
            statusDiv.innerHTML = "✅ Marked!";
            resultNameDiv.innerHTML = data.name;
            confidenceDiv.innerHTML = `Confidence: ${data.confidence.toFixed(1)}%`;
        } else if (data.status === 'result' && !data.success) {
            statusDiv.innerHTML = "❌ Not recognized";
            resultNameDiv.innerHTML = data.name;
            confidenceDiv.innerHTML = `Confidence: ${data.confidence.toFixed(1)}%`;
        }
    }

    // Stop button
    document.getElementById('stopBtn').addEventListener('click', () => {
        if (interval) clearInterval(interval);
        if (ipImage && ipImage._refreshInterval) clearInterval(ipImage._refreshInterval);
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            stream = null;
        }
        localVideo.srcObject = null;
        ipImage.style.display = 'none';
        localVideo.style.display = 'none';
        document.getElementById('statusMessage').innerHTML = "Attendance stopped.";
    });

    // Start with local by default
    switchToLocal();
</script>
{% endblock %}
